<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Empire Code — NYC Electrician Tool</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #0A0A0A;
    color: #e8e8e8;
    font-family: 'IBM Plex Mono', monospace;
    height: 100vh; height: 100dvh;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 0;
  }
  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 52px; letter-spacing: 6px;
    color: #FFC700; margin-bottom: 4px;
  }
  .sub {
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase; color: #4a9eff;
    margin-bottom: 6px;
  }
  .tagline {
    font-size: 10px; letter-spacing: 2px;
    text-transform: uppercase; color: #444;
    margin-bottom: 56px;
  }
  .btn {
    display: block; width: 260px; padding: 18px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px; letter-spacing: 4px;
    text-align: center; text-decoration: none;
    background: #FFC700; color: #000;
    border-radius: 4px; cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }
</style>
</head>
<body>
  <div class="logo">Empire Code</div>
  <div class="sub">NYCEC 2025 · NEC 2020</div>
  <div class="tagline">Built for NYC Electricians</div>
  <a class="btn" href="mobile.html">OPEN APP</a>
</body>
</html>
